# set random seed, so that you may reproduce your result.
__set_seed1: !apply:random.seed [1986]
__set_seed2: !apply:numpy.random.seed [1986]
__set_seed3: !apply:torch.manual_seed [1986]
__set_seed4: !apply:torch.cuda.manual_seed_all [1986]

# fixed params
sample_rate: 24000
llm_input_size: 896
llm_output_size: 896
spk_embed_dim: 192
qwen_pretrain_path: "Qwen/Qwen2.5-0.5B-Instruct"
token_frame_rate: 25
token_mel_ratio: 2

# stream related params
chunk_size: 25 # streaming inference chunk size, in token
num_decoding_left_chunks: -1 # streaming inference flow decoder left chunk size, <0 means use all left chunks

# model params
llm_model_path: !ref <qwen_pretrain_path>

flow: !new:cosyvoice.flow.flow.CausalMaskedDiffWithXvec
    input_size: 512
    output_size: 80
    spk_embed_dim: !ref <spk_embed_dim>
    output_type: 'mel'
    vocab_size: 6561
    input_frame_rate: !ref <token_frame_rate>
    only_mask_loss: True
    token_mel_ratio: !ref <token_mel_ratio>
    pre_lookahead_len: 3
    encoder: !new:cosyvoice.transformer.upsample_encoder.UpsampleConformerEncoder
        output_size: 512
        attention_heads: 8
        linear_units: 2048
        num_blocks: 6
        dropout_rate: 0.1
        positional_dropout_rate: 0.1
        attention_dropout_rate: 0.1
        normalize_before: True
        input_layer: 'linear'
        pos_enc_layer_type: 'rel_pos_espnet'
        selfattention_layer_type: 'rel_selfattn'
        input_size: 512
        use_cnn_module: False
        macaron_style: False
        static_chunk_size: !ref <chunk_size>
    decoder: !new:cosyvoice.flow.flow_matching.CausalConditionalCFM
        in_channels: 240
        n_spks: 1
        spk_emb_dim: 80
        cfm_params: !new:omegaconf.DictConfig
            content:
                sigma_min: 1e-06
                solver: 'euler'
                t_scheduler: 'cosine'
                training_cfg_rate: 0.2
                inference_cfg_rate: 0.7
                reg_loss_type: 'l1'
        estimator: !new:cosyvoice.flow.decoder.CausalConditionalDecoder
            in_channels: 320
            out_channels: 80
            channels: [256]
            dropout: 0.0
            attention_head_dim: 64
            n_blocks: 4
            num_mid_blocks: 12
            num_heads: 8
            act_fn: 'gelu'
            static_chunk_size: !ref <chunk_size> * <token_mel_ratio>
            num_decoding_left_chunks: !ref <num_decoding_left_chunks>

hift: !new:cosyvoice.hifigan.generator.HiFTGenerator
    in_channels: 80
    base_channels: 512
    nb_harmonics: 8
    sampling_rate: !ref <sample_rate>
    nsf_alpha: 0.1
    nsf_sigma: 0.003
    nsf_voiced_threshold: 10
    upsample_rates: [8, 5, 3]
    upsample_kernel_sizes: [16, 11, 7]
    istft_params:
        n_fft: 16
        hop_len: 4
    resblock_kernel_sizes: [3, 7, 11]
    resblock_dilation_sizes: [[1, 3, 5], [1, 3, 5], [1, 3, 5]]
    source_resblock_kernel_sizes: [7, 7, 11]
    source_resblock_dilation_sizes: [[1, 3, 5], [1, 3, 5], [1, 3, 5]]
    lrelu_slope: 0.1
    audio_limit: 0.99
    f0_predictor: !new:cosyvoice.hifigan.f0_predictor.ConvRNNF0Predictor
        num_class: 1
        in_channels: 80
        cond_channels: 512

# ─── 【修正ポイント1】 matchaの代わりとして、torchaudioの標準MelSpectrogramクラスを使用 ───
mel_spec_transform1: !new:torchaudio.transforms.MelSpectrogram
    sample_rate: !ref <sample_rate>
    n_fft: 1920
    win_length: 1920
    hop_length: 480
    f_min: 0
    f_max: null
    n_mels: 80
    center: False

hifigan: !new:cosyvoice.hifigan.hifigan.HiFiGan
    generator: !ref <hift>
    # ─── 【修正ポイント2】 ディスクリミネータもmatchaに依存しない標準構造、またはダミーに偽装 ───
    discriminator: null
    mel_spec_transform: [
        !ref <mel_spec_transform1>
    ]

# processor functions
# processor functions
parquet_opener: !name:speechLM.dataset.processor.parquet_opener
get_tokenizer: !name:speechLM.tokenizer.tokenizer.get_qwen_tokenizer
    token_path: !ref <qwen_pretrain_path>
    skip_special_tokens: True
allowed_special: 'all'
tokenize: !name:speechLM.dataset.processor.tokenize
    get_tokenizer: !ref <get_tokenizer>
    allowed_special: !ref <allowed_special>
filter: !name:speechLM.dataset.processor.filter
    max_length: 40960
    min_length: 100
    token_max_length: 200
    token_min_length: 1
resample: !name:speechLM.dataset.processor.resample
    resample_rate: !ref <sample_rate>
truncate: !name:speechLM.dataset.processor.truncate
    truncate_length: 24480

# データパイプラインのfeat_extractorもtorchaudioのMelSpectrogramクラスを指定
feat_extractor: !new:torchaudio.transforms.MelSpectrogram
    sample_rate: !ref <sample_rate>
    n_fft: 1920
    win_length: 1920
    hop_length: 480
    f_min: 0
    f_max: 8000
    n_mels: 80
    center: False

compute_fbank: !name:speechLM.dataset.processor.compute_fbank
    feat_extractor: !ref <feat_extractor>
compute_f0: !name:speechLM.dataset.processor.compute_f0
    sample_rate: !ref <sample_rate>
    hop_size: 480
parse_embedding: !name:speechLM.dataset.processor.parse_embedding
    normalize: True
shuffle: !name:speechLM.dataset.processor.shuffle
    shuffle_size: 1000
sort: !name:speechLM.dataset.processor.sort
    sort_size: 500
batch: !name:speechLM.dataset.processor.batch
    batch_type: 'dynamic'
    max_frames_in_batch: 2000
padding: !name:speechLM.dataset.processor.padding
    use_spk_embedding: False

# dataset processor pipeline
data_pipeline: [
    !ref <parquet_opener>,
    !ref <tokenize>,
    !ref <filter>,
    !ref <resample>,
    !ref <compute_fbank>,
    !ref <parse_embedding>,
    !ref <shuffle>,
    !ref <sort>,
    !ref <batch>,
    !ref <padding>,
]
data_pipeline_gan: [
    !ref <parquet_opener>,
    !ref <tokenize>,
    !ref <filter>,
    !ref <resample>,
    !ref <truncate>,
    !ref <compute_fbank>,
    !ref <compute_f0>,
    !ref <parse_embedding>,
    !ref <shuffle>,
    !ref <sort>,
    !ref <batch>,
    !ref <padding>,
]

# llm train conf
train_conf:
    optim: adamw
    batch_size: 2
    accum_grad: 4
    max_epoch: 5
    grad_clip: 1.0
    log_interval: 10
    save_per_step: -1

    optim_conf:
        lr: 2.0e-4
        weight_decay: 0.01
    scheduler: warmup_lr
    scheduler_conf:
        warmup_steps: 100

tokenizer_type: "cosyvoice2"
token_root_dir: "./output_tokens"